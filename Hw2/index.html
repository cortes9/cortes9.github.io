<!DOCTYPE html>
<html>
<head>
    <title>Simple Blackjack</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Blackjack</h1>

<p id="message">Click Start Game</p>

<p>Your Cards: <span id="playerCards"></span></p>
<p>Your Sum: <span id="playerSum">0</span></p>

<p>Dealer Sum: <span id="dealerSum">0</span></p>

<img id="resultImage" width="150">

<br><br>

<button id="startBtn">Start Game</button>
<button id="hitBtn">Hit</button>
<button id="standBtn">Stand</button>

<script src="script.js"></script>
</body>
</html>
